<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>йқўи«Үй Ҷз•Әеҫ…гҒЎзўәиӘҚ</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f6f8; margin: 0; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
    .number { font-size: 3.5rem; font-weight: bold; color: #2b6cb0; margin: 15px 0; }
    
    /* гӮҜгғ©гӮ№йҒёжҠһгғңгӮҝгғігҒ®гӮ№гӮҝгӮӨгғ« */
    .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .class-btn { background: #4a5568; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1.1rem; text-decoration: none; display: block; }
    .class-btn:hover { background: #2d3748; }

    button.action-btn { background: #319795; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 15px; width: 100%; }
    .back-link { display: inline-block; margin-top: 15px; color: #718096; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- 1. гӮҜгғ©гӮ№йҒёжҠһз”»йқўпјҲclassIDгҒҢгҒӘгҒ„е ҙеҗҲгҒ«иЎЁзӨәпјү -->
  <div id="view-select" class="card" style="display: none;">
    <h2>гӮҜгғ©гӮ№гӮ’йҒёжҠһгҒ—гҒҰгҒҸгҒ гҒ•гҒ„</h2>
    <div class="class-grid">
      <a href="?classID=1A" class="class-btn">1A</a>
      <a href="?classID=1B" class="class-btn">1B</a>
      <a href="?classID=1A" class="class-btn">1C</a>
      <a href="?classID=1B" class="class-btn">1D</a>
      <a href="?classID=1A" class="class-btn">2A</a>
      <a href="?classID=1B" class="class-btn">2B</a>
      <a href="?classID=1A" class="class-btn">2C</a>
      <a href="?classID=1B" class="class-btn">2D</a>
      <a href="?classID=1A" class="class-btn">3A</a>
      <a href="?classID=1B" class="class-btn">3B</a>
      <a href="?classID=1A" class="class-btn">3C</a>
      <a href="?classID=1B" class="class-btn">3D</a>
    </div>
  </div>

  <!-- 2. еҗ„гӮҜгғ©гӮ№гҒ®й Ҷз•ӘзўәиӘҚз”»йқўпјҲclassIDгҒҢгҒӮгӮӢе ҙеҗҲгҒ«иЎЁзӨәпјү -->
  <div id="view-status" class="card" style="display: none;">
    <h2 id="class-title">--</h2>
    <p style="margin-bottom: 0; color: #718096;">зҸҫеңЁгҒ®е‘јеҮәз•ӘеҸ·</p>
    <div class="number" id="current-number">--</div>
    
    <button class="action-btn" onclick="requestNotification()">гҒ“гҒ®гӮҜгғ©гӮ№гҒ®йҖҡзҹҘгӮ’еҸ—гҒ‘еҸ–гӮӢ</button>
    <br>
    <a href="index.html" class="back-link">вҶҗ гӮҜгғ©гӮ№йҒёжҠһгҒ«жҲ»гӮӢ</a>
  </div>
  <!-- Supabase JS SDK гҒ®иӘӯгҒҝиҫјгҒҝ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // SupabaseгҒ®жҺҘз¶ҡжғ…е ұпјҲSupabaseгҒ®Project Settings > API гҒӢгӮүеҸ–еҫ—пјү
  const SUPABASE_URL = 'https://YOUR_PROJECT_ID.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const urlParams = new URLSearchParams(window.location.search);
  const classID = urlParams.get('classID');

  if (classID) {
    document.getElementById('view-status').style.display = 'block';
    document.getElementById('class-title').textContent = `${classID} гҒ®е‘јгҒіеҮәгҒ—зҠ¶жіҒ`;

    // 1. еҲқжңҹгғҮгғјгӮҝгҒ®еҸ–еҫ—
    async function fetchCurrentNumber() {
      const { data, error } = await supabase
        .from('classes')
        .select('current_number')
        .eq('class_id', classID)
        .single();

      if (data) {
        updateNumberDisplay(data.current_number);
      }
    }

    // 2. гғӘгӮўгғ«гӮҝгӮӨгғ зӣЈиҰ–пјҲз”»йқўгӮ’й–ӢгҒ„гҒҰгҒ„гӮӢй–“гҒ«е…Ҳз”ҹгҒҢз•ӘеҸ·гӮ’еӨүгҒҲгҒҹгӮүиҮӘеӢ•еҸҚжҳ пјү
    supabase
      .channel('public:classes')
      .on('postgres_changes', { 
        event: 'UPDATE', 
        schema: 'public', 
        table: 'classes', 
        filter: `class_id=eq.${classID}` 
      }, payload => {
        const newNumber = payload.new.current_number;
        updateNumberDisplay(newNumber);
        
        // гғ–гғ©гӮҰгӮ¶гҒҢй–ӢгҒ„гҒҰгҒ„гӮӢжҷӮгҒ®гғӯгғјгӮ«гғ«йҖҡзҹҘпјҲгғҶгӮ№гғҲз”Ёпјү
        if (Notification.permission === 'granted') {
          new Notification(`${classID}йқўи«Ү`, {
            body: `зҸҫеңЁгҒ®е‘јеҮәз•ӘеҸ·гҒҢ ${newNumber} з•ӘгҒ«гҒӘгӮҠгҒҫгҒ—гҒҹпјҒ`,
            icon: 'icon.png'
          });
        }
      })
      .subscribe();

    fetchCurrentNumber();
  } else {
    document.getElementById('view-select').style.display = 'block';
  }

  function updateNumberDisplay(num) {
    document.getElementById('current-number').textContent = `${num}з•Ә`;
  }
</script>
</body>
</html>
