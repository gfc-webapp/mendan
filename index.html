<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>面談順番待ち確認</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f6f8; margin: 0; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); max-width: 400px; margin: 20px auto; }
    .number { font-size: 3.5rem; font-weight: bold; color: #2b6cb0; margin: 15px 0; }
    
    /* クラス選択ボタンのスタイル */
    .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
    .class-btn { background: #4a5568; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 1.1rem; text-decoration: none; display: block; }
    .class-btn:hover { background: #2d3748; }

    button.action-btn { background: #319795; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 1rem; cursor: pointer; margin-top: 15px; width: 100%; }
    .back-link { display: inline-block; margin-top: 15px; color: #718096; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>

  <!-- 1. クラス選択画面（classIDがない場合に表示） -->
  <div id="view-select" class="card" style="display: none;">
    <h2>クラスを選択してください</h2>
    <div class="class-grid">
      <a href="?classID=1A" class="class-btn">1A</a>
      <a href="?classID=1B" class="class-btn">1B</a>
      <a href="?classID=1C" class="class-btn">1C</a>
      <a href="?classID=1D" class="class-btn">1D</a>
      <a href="?classID=2A" class="class-btn">2A</a>
      <a href="?classID=2B" class="class-btn">2B</a>
      <a href="?classID=2C" class="class-btn">2C</a>
      <a href="?classID=2D" class="class-btn">2D</a>
      <a href="?classID=3A" class="class-btn">3A</a>
      <a href="?classID=3B" class="class-btn">3B</a>
      <a href="?classID=3C" class="class-btn">3C</a>
      <a href="?classID=3D" class="class-btn">3D</a>
    </div>
  </div>

  <!-- 2. 各クラスの順番確認画面（classIDがある場合に表示） -->
  <div id="view-status" class="card" style="display: none;">
    <h2 id="class-title">--</h2>
    <p style="margin-bottom: 0; color: #718096;">現在の呼出番号</p>
    <div class="number" id="current-number">--</div>
    
    <button class="action-btn" onclick="requestNotification()">このクラスの通知を受け取る</button>
    <br>
    <a href="index.html" class="back-link">← クラス選択に戻る</a>
  </div>

  <!-- Supabase JS SDK の読み込み -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // サービスワーカーの登録（PWA・通知に必須）
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    // Supabaseの接続情報
    const SUPABASE_URL = 'https://vyaaydlpndgptjpcasfz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ5YWF5ZGxwbmRncHRqcGNhc2Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1OTQ2MjgsImV4cCI6MjEwMDE3MDYyOH0.Px5jQ4cghT9JDMKOJxBjcsQ7o4bJRnAxvXHljrV5aDk';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const classID = urlParams.get('classID');

    if (classID) {
      document.getElementById('view-status').style.display = 'block';
      document.getElementById('class-title').textContent = `${classID} の呼び出し状況`;

      // 1. 初期データの取得
      async function fetchCurrentNumber() {
        const { data, error } = await supabaseClient
          .from('classes')
          .select('current_number')
          .eq('class_id', classID)
          .single();

        if (data) {
          updateNumberDisplay(data.current_number);
        }
      }

      // 2. リアルタイム監視（画面を開いている間に先生が番号を変えたら自動反映）
      supabaseClient
        .channel('public:classes')
        .on('postgres_changes', { 
          event: 'UPDATE', 
          schema: 'public', 
          table: 'classes', 
          filter: `class_id=eq.${classID}` 
        }, payload => {
          const newNumber = payload.new.current_number;
          updateNumberDisplay(newNumber);
          
          // ブラウザが開いている時のローカル通知（テスト用）
          if (Notification.permission === 'granted') {
            new Notification(`${classID}面談`, {
              body: `現在の呼出番号が ${newNumber} 番になりました！`,
              icon: 'icon.png'
            });
          }
        })
        .subscribe();

      fetchCurrentNumber();
    } else {
      document.getElementById('view-select').style.display = 'block';
    }

    function updateNumberDisplay(num) {
      document.getElementById('current-number').textContent = `${num}番`;
    }

    // Base64文字列をUint8Arrayに変換するヘルパー関数
    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding)
        .replace(/\-/g, '+')
        .replace(/_/g, '/');

      const rawData = window.atob(base64);
      const outputArray = new Uint8Array(rawData.length);

      for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
      }
      return outputArray;
    }

    // 通知登録関数
    async function requestNotification() {
      if (!('serviceWorker' in navigator)) {
        alert('お使いのブラウザは通知に対応していません。');
        return;
      }

      try {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          const reg = await navigator.serviceWorker.ready;

          // TODO: ここに発行した VAPID Public Key を設定してください
          const vapidPublicKey = 'BNwn33_C47GYb50iD4kTf0FU_AukxxxyBA-8978i9D85kZKNKIyJeEpq-HMCZrnWicGOS9jLPRfDqiZTHzw6ptE'; 
          const convertedKey = urlBase64ToUint8Array(vapidPublicKey);

          // ブラウザから Push 購読情報を取得
          const subscription = await reg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: convertedKey
          });

          // Supabaseに保存
          const { error } = await supabaseClient.from('push_subscriptions').insert({
            class_id: classID,
            subscription: subscription.toJSON()
          });

          if (error) {
            console.error('Supabase保存エラー:', error);
            alert('通知登録に失敗しました。');
          } else {
            alert(`${classID} の通知を設定しました！`);
          }
        } else {
          alert('通知の許可が得られませんでした。');
        }
      } catch (err) {
        console.error('通知設定エラー:', err);
        alert('通知設定中にエラーが発生しました。');
      }
    }
  </script>
</body>
</html>
